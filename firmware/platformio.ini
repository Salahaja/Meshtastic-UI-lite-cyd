[platformio]
default_envs = esp32-2432S028
src_dir = firmware/src
include_dir = firmware/include
lib_dir = firmware/lib

[env:esp32-2432S028]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags =
  -D USER_SETUP_LOADED=1
  -D ILI9341_2_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=12
  -D TFT_BL=21
  -D TOUCH_CS=33
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D LOAD_FONT7=1
  -D LOAD_FONT8=1
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=1
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=20000000
  -D SPI_TOUCH_FREQUENCY=2500000

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.34
  lvgl/lvgl @ ^8.3.9
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
  https://github.com/meshtastic/Meshtastic-protobufs-arduino.git
  nanopb/Nanopb @ ^0.4.7
